name: build-linux-arm64

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            pkg-config \
            make

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build libwg for linux arm64
        run: |
          git submodule update --init --recursive
          cd libwg/wireguard-go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc make libwg
          mv libwg.* ../

      - name: Build corplink-rs for linux arm64
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          BINDGEN_EXTRA_CLANG_ARGS: "--target=aarch64-unknown-linux-gnu --sysroot=/usr/aarch64-linux-gnu"
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/corplink-rs dist/
          file dist/corplink-rs
          tar -czf corplink-rs-linux-arm64.tar.gz -C dist corplink-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corplink-rs-linux-arm64
          path: corplink-rs-linux-arm64.tar.gz
