name: build-corplink-rs-linux-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout corplink-rs
        uses: actions/checkout@v4
        with:
          repository: PinkD/corplink-rs
          ref: master
          submodules: recursive
          path: corplink-rs

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev gcc-aarch64-linux-gnu make pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build libwg
        working-directory: corplink-rs/libwg
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc ./build.sh
          ls -la

      - name: Build corplink-rs
        working-directory: corplink-rs
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          BINDGEN_EXTRA_CLANG_ARGS: "--target=aarch64-unknown-linux-gnu"
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          cp corplink-rs/target/aarch64-unknown-linux-gnu/release/corplink-rs dist/
          tar -czf corplink-rs-linux-arm64.tar.gz -C dist corplink-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corplink-rs-linux-arm64
          path: corplink-rs-linux-arm64.tar.gz
